services:
  - type: web
    name: vaptforge-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && playwright install chromium --with-deps
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./vapt_platform.db
      - key: DEBUG
        value: false
      - key: MAX_CONCURRENT_SCANS
        value: 3
      - key: REPORTS_DIR
        value: ./reports
